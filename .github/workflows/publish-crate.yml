name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like "v1.0.0"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish_if_needed() {
            local crate=$1
            local dir=$2
            local version=$(grep '^version' "$dir/Cargo.toml" | sed 's/version = "\(.*\)"/\1/')
            local status=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$crate/$version")
            if [ "$status" = "200" ]; then
              echo "$crate $version already published, skipping"
            else
              cargo publish -p "$crate" --verbose
            fi
          }

          publish_if_needed rasterix-core rasterix-core
          publish_if_needed rasterix-codegen rasterix-codegen
          publish_if_needed rasterix rasterix
