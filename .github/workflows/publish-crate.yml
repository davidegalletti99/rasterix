name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like "v1.0.0"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          published=0
          failed=0

          try_publish() {
            local crate=$1
            local output
            output=$(cargo publish -p "$crate" --verbose 2>&1)
            local exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if echo "$output" | grep -q "already exists"; then
                echo "$crate already published, skipping"
              else
                echo "ERROR publishing $crate:"
                echo "$output"
                failed=$((failed + 1))
              fi
            else
              echo "$output"
              published=$((published + 1))
            fi
          }

          try_publish rasterix-core
          try_publish rasterix-codegen
          try_publish rasterix

          echo "Published: $published, Failed: $failed"
          if [ $published -eq 0 ] && [ $failed -gt 0 ]; then
            echo "All publications failed"
            exit 1
          fi
